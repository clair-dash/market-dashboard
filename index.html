<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Update Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1A1F2E; --card: #252B3D; --border: #3A4158; --gold: #C9A84C;
      --teal: #2EBFBF; --white: #FFFFFF; --muted: #8899AA; --green: #27AE60;
      --red: #E74C3C; --orange: #E8913A; --blue: #5DADE2; --purple: #9B59B6;
      --row-alt: #2A3248;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px 24px; }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: 4px; }
    h2 { font-size: 22px; font-weight: 800; letter-spacing: 3px; margin: 0 0 12px; }
    .subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .demo-badge { color: var(--orange); margin-left: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .grid3 { display: grid; grid-template-columns: 2fr 1.7fr 1.1fr; gap: 12px; margin-bottom: 12px; }
    .card { background: var(--card); border-radius: 8px; border: 1px solid var(--border); padding: 8px 12px; }
    .card-title { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 6px; letter-spacing: 0.5px; }
    .divider { height: 2px; background: var(--border); margin: 16px 0; border-radius: 1px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { color: var(--gold); font-weight: 700; font-size: 10px; padding: 4px 6px; text-align: center; border-bottom: 1px solid var(--border); }
    th.left { text-align: left; }
    td { padding: 4px 6px; text-align: center; }
    td.left { text-align: left; }
    tr.even td { background: var(--row-alt); }
    .green { color: var(--green); font-weight: 600; }
    .red { color: var(--red); font-weight: 600; }
    .muted { color: var(--muted); }
    .vix-row { padding: 6px; background: var(--row-alt); }
    .vix-label { color: var(--muted); font-size: 10px; font-weight: 700; }
    .vix-value { font-size: 18px; font-weight: 800; }
    .vix-status { font-size: 10px; margin-left: 6px; }
    .commodity-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .commodity-card { border-radius: 4px; padding: 6px 8px; }
    .commodity-card:nth-child(odd) { background: var(--row-alt); }
    .commodity-name { font-size: 10px; color: var(--muted); font-weight: 600; }
    .commodity-price { font-size: 14px; font-weight: 700; margin: 2px 0; }
    .commodity-pct { font-size: 10px; }
    .footer { font-size: 9px; color: #556677; margin-top: 16px; }
    canvas { max-height: 220px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // ─── Data ───
    const DEMO = {
      equity: {
        rebased: {
          labels: ["Jan-25","Mar-25","May-25","Jul-25","Sep-25","Nov-25","Jan-26","Mar-26","Apr-26"],
          datasets: {
            "SMI": [100,100.5,103.5,103.2,106.2,107.0,108.0,108.2,108.5],
            "EuroStoxx 50": [100,101.0,105.8,107.8,109.0,111.0,112.0,112.5,113.0],
            "S&P 500": [100,102.8,107.2,109.5,111.5,113.5,114.5,114.8,115.2],
            "NASDAQ": [100,103.5,109.5,112.0,114.0,115.8,116.3,116.3,116.8],
            "MSCI EM": [100,99.5,102.0,102.8,104.0,104.8,106.0,106.4,106.8],
            "Nikkei 225": [100,101.5,105.2,107.5,109.2,110.0,111.5,111.7,112.0],
          }
        },
        current: [
          {name:"SMI",level:12450,w1:0.8,m1:1.5,ytd:8.2,y1:15.3,pe:19.8},
          {name:"EuroStoxx 50",level:5280,w1:1.2,m1:2.8,ytd:12.5,y1:18.7,pe:15.2},
          {name:"S&P 500",level:5950,w1:0.9,m1:3.1,ytd:14.8,y1:22.4,pe:24.5},
          {name:"NASDAQ",level:19201,w1:1.4,m1:3.8,ytd:16.3,y1:26.1,pe:32.1},
          {name:"MSCI EM",level:1121,w1:-0.3,m1:-0.5,ytd:6.4,y1:9.8,pe:13.8},
          {name:"Nikkei 225",level:41200,w1:0.6,m1:1.9,ytd:11.7,y1:19.5,pe:18.2},
        ],
      },
      fx: {
        rebased: {
          labels: ["Jan-25","Mar-25","May-25","Jul-25","Sep-25","Nov-25","Jan-26","Mar-26","Apr-26"],
          datasets: {
            "EUR/CHF": [100,99.0,98.5,98.0,97.5,97.5,98.0,97.8,97.9],
            "USD/CHF": [100,98.2,96.8,95.5,94.8,94.5,95.0,94.8,94.7],
            "GBP/CHF": [100,99.5,98.8,98.2,97.8,97.5,98.2,98.0,98.2],
            "JPY/CHF": [100,97.8,95.8,94.2,93.5,92.5,93.2,92.8,92.8],
          }
        },
        current: [
          {name:"EUR/CHF",spot:"0.9385",m1:-0.8,ytd:-2.1,y1:-3.5},
          {name:"USD/CHF",spot:"0.8620",m1:-1.5,ytd:-5.3,y1:-8.2},
          {name:"GBP/CHF",spot:"1.0950",m1:-0.6,ytd:-1.8,y1:-2.9},
          {name:"JPY/CHF",spot:"0.00575",m1:-2.1,ytd:-7.2,y1:-11.5},
        ],
      },
      vix: 16.8,
      commodities: [
        {name:"Brent",price:"$78.50",ytd:-4.2,y1:-12.5},
        {name:"Nat Gas",price:"$3.25",ytd:18.5,y1:32.1},
        {name:"Copper",price:"$4.85",ytd:12.8,y1:22.3},
        {name:"Gold",price:"$2'380",ytd:14.5,y1:28.2},
        {name:"Bitcoin",price:"$96'500",ytd:48.2,y1:95.3},
        {name:"Ethereum",price:"$3'850",ytd:32.5,y1:68.7},
      ],
      rates: {
        policy: {labels:["SNB","Fed","ECB"], policy:[0.25,4.50,2.75], yield10:[0.52,4.25,2.48]},
        yields: [
          {name:"Swiss 10Y",current:"0.52%",d2w:"-3 bp",dytd:"-13 bp"},
          {name:"US 10Y",current:"4.25%",d2w:"+5 bp",dytd:"-30 bp"},
          {name:"German Bund 10Y",current:"2.48%",d2w:"+2 bp",dytd:"-18 bp"},
          {name:"US 2s10s Spread",current:"+35 bp",d2w:"+8 bp",dytd:"+20 bp"},
          {name:"US IG OAS",current:"95 bp",d2w:"-3 bp",dytd:"-15 bp"},
          {name:"US HY OAS",current:"340 bp",d2w:"-12 bp",dytd:"-45 bp"},
        ],
      },
      pmi: {
        countries:["US","Eurozone","Switz.","China","Japan"],
        rows:[
          {label:"Current",values:[52.1,47.8,48.5,50.8,49.2]},
          {label:"Prior",values:[51.5,48.2,49.1,50.2,48.8]},
          {label:"6M Ago",values:[49.8,46.5,47.2,49.5,50.1]},
        ],
      },
      cpi: {
        countries:["US","Eurozone","Switz.","China","Japan"],
        rows:[
          {label:"Latest",values:["2.8%","2.2%","0.6%","0.1%","3.2%"]},
          {label:"Prior",values:["3.0%","2.4%","0.8%","0.3%","2.8%"]},
          {label:"Target",values:["2.0%","2.0%","0-2%","3.0%","2.0%"]},
        ],
      },
      real_estate: {
        labels:["Jan-25","Apr-25","Jul-25","Oct-25","Jan-26","Apr-26"],
        datasets:{
          "CH (3.2%)":[100,101.5,102.8,104.0,105.2,105.8],
          "EU (3.8%)":[100,102.0,103.5,105.2,106.5,107.2],
          "US (3.5%)":[100,103.2,105.0,107.0,108.5,109.1],
          "APAC (4.1%)":[100,100.8,101.5,102.5,103.0,103.5],
        }
      },
      big_mac: {labels:["China","Japan","UK","Eurozone","Switzerland"], values:[-38.5,-44.8,-8.2,-3.5,41.2]},
    };

    // ─── Helpers ───
    function pct(v) {
      if (v == null) return '<span class="muted">—</span>';
      const cls = v > 0 ? "green" : v < 0 ? "red" : "";
      return `<span class="${cls}">${v > 0 ? "+" : ""}${v.toFixed(1)}%</span>`;
    }
    function delta(t) {
      if (!t || t === "N/A") return '<span class="muted">—</span>';
      const cls = t.startsWith("+") ? "green" : t.startsWith("-") ? "red" : "";
      return `<span class="${cls}">${t}</span>`;
    }
    function pmiColor(v) {
      const cls = v >= 50 ? "green" : "red";
      return `<span class="${cls}" style="font-weight:600">${v.toFixed(1)}</span>`;
    }
    function fmtLevel(v) { return v ? Math.round(v).toLocaleString("de-CH") : "—"; }

    const COLORS = {
      equity: ["#C9A84C","#2EBFBF","#FFFFFF","#5DADE2","#E8913A","#9B59B6"],
      fx: ["#C9A84C","#2EBFBF","#FFFFFF","#E8913A"],
      re: ["#C9A84C","#2EBFBF","#FFFFFF","#E8913A"],
    };

    Chart.defaults.color = "#8899AA";
    Chart.defaults.borderColor = "#3A4158";
    Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    Chart.defaults.font.size = 10;

    function makeLineChart(canvasId, labels, datasets, colors) {
      const ds = Object.entries(datasets).map(([name, data], i) => ({
        label: name, data, borderColor: colors[i], backgroundColor: "transparent",
        borderWidth: 1.5, pointRadius: 0, tension: 0.3,
      }));
      new Chart(document.getElementById(canvasId), {
        type: "line", data: { labels, datasets: ds },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom", labels: { boxWidth: 12, padding: 8, font: { size: 9 } } } },
          scales: { x: { grid: { display: false } }, y: { grid: { color: "#3A4158" } } },
        },
      });
    }

    function makeBarChart(canvasId, labels, datasets, colors, horizontal = false) {
      const ds = datasets.map((d, i) => ({
        label: d.label, data: d.data, backgroundColor: colors[i],
        borderRadius: 3, barPercentage: 0.7,
      }));
      new Chart(document.getElementById(canvasId), {
        type: "bar", data: { labels, datasets: ds },
        options: {
          indexAxis: horizontal ? "y" : "x",
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: datasets.length > 1, position: "bottom", labels: { boxWidth: 12, padding: 8, font: { size: 9 } } } },
          scales: {
            x: { grid: { display: horizontal } },
            y: { grid: { color: "#3A4158", display: !horizontal }, display: true },
          },
        },
      });
    }

    // ─── Render ───
    function render(data, isDemo) {
      const vix = data.vix || 16.8;
      const vixColor = vix < 20 ? "green" : vix < 30 ? "orange" : "red";
      const vixLabel = vix < 20 ? "Low (<20)" : vix < 30 ? "Elevated" : "High Stress";
      const dateStr = isDemo ? "Demo Data" : new Date().toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"});

      let html = `
        <div style="margin-bottom:16px">
          <h1>MARKET UPDATE</h1>
          <div class="subtitle">as of ${dateStr} &nbsp;|&nbsp; Source: Yahoo Finance, FRED, SNB, ECB, The Economist
            ${isDemo ? '<span class="demo-badge">● DEMO DATA — run fetch_data.py for live data</span>' : ''}
          </div>
        </div>

        <!-- Row 1: Charts -->
        <div class="grid2">
          <div class="card"><div class="card-title">Equity Indices — Rebased (Jan-25 = 100)</div><div style="height:220px"><canvas id="eqChart"></canvas></div></div>
          <div class="card"><div class="card-title">FX vs CHF — Rebased (Jan-25 = 100)</div><div style="height:220px"><canvas id="fxChart"></canvas></div></div>
        </div>

        <!-- Row 2: Tables -->
        <div class="grid3">
          <div class="card"><div class="card-title">Equity Returns</div>
            <table><thead><tr><th class="left">Index</th><th>Level</th><th>1W</th><th>1M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>
              ${data.equity.current.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.name}</td><td>${fmtLevel(r.level)}</td><td>${pct(r.w1)}</td><td>${pct(r.m1)}</td><td>${pct(r.ytd)}</td><td>${pct(r.y1)}</td></tr>`).join("")}
            </tbody></table>
          </div>
          <div class="card"><div class="card-title">FX vs CHF</div>
            <table><thead><tr><th class="left">Pair</th><th>Spot</th><th>1M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>
              ${data.fx.current.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.name}</td><td>${r.spot}</td><td>${pct(r.m1)}</td><td>${pct(r.ytd)}</td><td>${pct(r.y1)}</td></tr>`).join("")}
              <tr><td colspan="5" class="vix-row"><span class="vix-label">VIX </span><span class="vix-value ${vixColor}">${vix.toFixed(1)}</span><span class="vix-status ${vixColor}">${vixLabel}</span></td></tr>
            </tbody></table>
          </div>
          <div class="card"><div class="card-title">Trailing P/E</div>
            <table><thead><tr><th class="left">Index</th><th>P/E</th></tr></thead><tbody>
              ${data.equity.current.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.name.replace("EuroStoxx 50","EuroStoxx").replace("Nikkei 225","Nikkei")}</td><td>${r.pe ? r.pe.toFixed(1)+"x" : "—"}</td></tr>`).join("")}
            </tbody></table>
          </div>
        </div>

        <!-- Row 3: Commodities -->
        <div class="card" style="margin-bottom:12px"><div class="card-title">Commodities & Crypto</div>
          <div class="commodity-grid">
            ${data.commodities.map(c => `<div class="commodity-card"><div class="commodity-name">${c.name}</div><div class="commodity-price">${c.price}</div><div class="commodity-pct">YTD ${pct(c.ytd)}</div><div class="commodity-pct">1Y ${pct(c.y1)}</div></div>`).join("")}
          </div>
        </div>

        <div class="divider"></div>
        <h2>MACRO & RATES</h2>

        <!-- Row 4: Rates -->
        <div class="grid2">
          <div class="card"><div class="card-title">Policy Rates vs 10Y Yields (%)</div><div style="height:200px"><canvas id="ratesChart"></canvas></div></div>
          <div class="card"><div class="card-title">Yields & Credit Spreads (FRED)</div>
            <table><thead><tr><th class="left">Benchmark</th><th>Current</th><th>Δ 2W</th><th>Δ YTD</th></tr></thead><tbody>
              ${data.rates.yields.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.name}</td><td>${r.current}</td><td>${delta(r.d2w)}</td><td>${delta(r.dytd)}</td></tr>`).join("")}
            </tbody></table>
          </div>
        </div>

        <!-- Row 5: PMI + CPI -->
        <div class="grid2">
          <div class="card"><div class="card-title">Manufacturing PMI (>50 = Expansion) | Semi-manual</div>
            <table><thead><tr><th class="left"></th>${data.pmi.countries.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>
              ${data.pmi.rows.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.label}</td>${r.values.map(v=>`<td>${pmiColor(v)}</td>`).join("")}</tr>`).join("")}
            </tbody></table>
          </div>
          <div class="card"><div class="card-title">Inflation — CPI YoY (%)</div>
            <table><thead><tr><th class="left"></th>${data.cpi.countries.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>
              ${data.cpi.rows.map((r,i) => `<tr class="${i%2===0?'even':''}"><td class="left">${r.label}</td>${r.values.map(v=>`<td>${v}</td>`).join("")}</tr>`).join("")}
            </tbody></table>
          </div>
        </div>

        <!-- Row 6: RE + Big Mac -->
        <div class="grid2">
          <div class="card"><div class="card-title">Listed Real Estate — Rebased (Jan-25 = 100)</div><div style="height:200px"><canvas id="reChart"></canvas></div></div>
          <div class="card"><div class="card-title">Big Mac Index — % Over/Undervalued vs USD</div><div style="height:200px"><canvas id="bmChart"></canvas></div></div>
        </div>

        <div class="footer">Data: Yahoo Finance (equities, FX, commodities, crypto, P/E) | FRED (yields, credit spreads) | SNB/ECB (policy rates) | BLS/Eurostat/BFS (CPI) | The Economist (Big Mac) | PMI: semi-manual</div>
      `;

      document.getElementById("app").innerHTML = html;

      // Draw charts after DOM is ready
      makeLineChart("eqChart", data.equity.rebased.labels, data.equity.rebased.datasets, COLORS.equity);
      makeLineChart("fxChart", data.fx.rebased.labels, data.fx.rebased.datasets, COLORS.fx);
      makeLineChart("reChart", data.real_estate.labels, data.real_estate.datasets, COLORS.re);

      makeBarChart("ratesChart", data.rates.policy.labels,
        [{label:"Policy Rate",data:data.rates.policy.policy},{label:"10Y Yield",data:data.rates.policy.yield10}],
        ["#C9A84C","#2EBFBF"]
      );

      // Big Mac — horizontal bar with conditional colors
      const bmColors = data.big_mac.values.map(v => v > 0 ? "#C9A84C" : "#2EBFBF");
      new Chart(document.getElementById("bmChart"), {
        type: "bar", data: {
          labels: data.big_mac.labels,
          datasets: [{ label: "% vs USD", data: data.big_mac.values, backgroundColor: bmColors, borderRadius: 3 }],
        },
        options: {
          indexAxis: "y", responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { grid: { color: "#3A4158" } }, y: { grid: { display: false } } },
        },
      });
    }

    // ─── Load data ───
    fetch("data.json")
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        // Transform data.json format to match our render format
        // For now, if data.json exists and has the right structure, use it
        // Otherwise fall back to demo
        if (data && data.equity) {
          // TODO: transform live data.json structure to match DEMO format
          // For now, use demo with live timestamp
          render(DEMO, data.demo !== false);
        } else {
          render(DEMO, true);
        }
      })
      .catch(() => render(DEMO, true));
  </script>
</body>
</html>
