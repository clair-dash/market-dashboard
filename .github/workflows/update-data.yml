name: Update Dashboard Data

on:
  schedule:
    # Every 5 minutes, Mon-Fri, 6:00-22:00 UTC
    # Covers: Asia close, Europe open/close, US open/close
    - cron: '*/6 6-22 * * 1-5'
    # Once at 7am UTC on weekends (for crypto/fx weekend moves)
    - cron: '0 7 * * 0,6'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "data-update"
  cancel-in-progress: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas

      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update market data $(date -u +%Y-%m-%dT%H:%M)" || echo "No changes to commit"
          git push

  deploy:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
